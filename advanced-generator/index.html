<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to Kenthir App</title>
    <style>
        :root {
            --primary-color: #4285f4;
            --secondary-color: #34a853;
            --accent-color: #ea4335;
            --light-color: #f8f9fa;
            --dark-color: #202124;
            --border-radius: 8px;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light-color);
            color: var(--dark-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
            transition: all 0.3s ease;
        }
        
        .redirect-container {
            max-width: 500px;
            width: 100%;
            padding: 30px;
            background-color: white;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }
        
        h1 {
            margin-bottom: 20px;
            color: var(--primary-color);
        }
        
        p {
            margin-bottom: 30px;
            color: #5f6368;
        }
        
        .loading-container {
            margin: 30px 0;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(66, 133, 244, 0.2);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            margin: 0 auto 20px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .progress-container {
            width: 100%;
            height: 8px;
            background-color: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            transition: width 0.1s linear;
            border-radius: 4px;
        }
        
        .countdown {
            font-size: 0.9rem;
            color: #5f6368;
        }
        
        .manual-link {
            margin-top: 20px;
        }
        
        a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
        }
        
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="redirect-container">
        <h1>Sedang Mengalihkan...</h1>
        <p>Anda akan diarahkan ke Kenthir App dalam beberapa detik.</p>
        
        <div class="loading-container">
            <div class="spinner"></div>
            <div class="progress-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="countdown" id="countdown">Mengalihkan dalam 5 detik...</div>
        </div>
        
        <div class="manual-link">
            Jika tidak otomatis mengalihkan, <a href="https://app.kenthir.my.id" id="manualRedirect">klik di sini</a>
        </div>
    </div>

    <script>
        // Target URL
        const targetUrl = "https://app.kenthir.my.id";
        
        // Elements
        const progressBar = document.getElementById('progressBar');
        const countdownElement = document.getElementById('countdown');
        const manualRedirectLink = document.getElementById('manualRedirect');
        
        // Duration in milliseconds (5 seconds)
        const duration = 5000;
        const interval = 50; // Update every 50ms for smooth progress
        const steps = duration / interval;
        let currentStep = 0;
        
        // Update progress bar and countdown
        const updateProgress = () => {
            currentStep++;
            const progress = (currentStep / steps) * 100;
            progressBar.style.width = `${progress}%`;
            
            // Update countdown text
            const secondsLeft = Math.ceil((duration - (currentStep * interval)) / 1000);
            countdownElement.textContent = `Mengalihkan dalam ${secondsLeft} detik...`;
            
            if (currentStep >= steps) {
                clearInterval(progressInterval);
                window.location.href = targetUrl;
            }
        };
        
        // Start the progress interval
        const progressInterval = setInterval(updateProgress, interval);
        
        // Manual redirect fallback
        manualRedirectLink.addEventListener('click', (e) => {
            e.preventDefault();
            clearInterval(progressInterval);
            window.location.href = targetUrl;
        });
        
        // Redirect immediately if the user tries to leave the page
        window.onbeforeunload = function() {
            clearInterval(progressInterval);
            window.location.href = targetUrl;
        };
    </script>
</body>
</html>
