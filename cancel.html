<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pembatalan - SosialAutoPro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        :root {
            --primary: #4361ee;
            --secondary: #3f37c9;
            --danger: #D80B43;
            --dark: #212529;
            --light: #f8f9fa;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #f5f5f5;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            text-align: center;
        }
        
        .cancel-container {
            max-width: 500px;
            width: 100%;
            background-color: #1e1e1e;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        .cancel-icon {
            font-size: 4rem;
            color: var(--danger);
            margin-bottom: 20px;
            animation: bounce 1s;
        }
        
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-20px);}
            60% {transform: translateY(-10px);}
        }
        
        h1 {
            color: var(--danger);
            margin-bottom: 15px;
            font-size: 1.8rem;
        }
        
        p {
            color: #aaa;
            margin-bottom: 25px;
            line-height: 1.6;
        }
        
        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 12px 25px;
            border-radius: 5px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }
        
        .btn-primary {
            background-color: var(--primary);
            color: white;
        }
        
        .btn-primary:hover {
            background-color: var(--secondary);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(67, 97, 238, 0.3);
        }
        
        .btn-outline {
            background-color: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
        }
        
        .btn-outline:hover {
            background-color: rgba(67, 97, 238, 0.1);
            transform: translateY(-2px);
        }
        
        .btn i {
            margin-right: 8px;
        }
        
        .glow {
            position: fixed;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(216, 11, 67, 0.2) 0%, rgba(216, 11, 67, 0) 70%);
            filter: blur(10px);
            z-index: -1;
        }
        
        .glow-1 {
            top: -50px;
            left: -50px;
        }
        
        .glow-2 {
            bottom: -50px;
            right: -50px;
        }

        /* Responsive adjustments */
        @media (max-width: 600px) {
            .cancel-container {
                padding: 20px;
            }
            
            .cancel-icon {
                font-size: 3rem;
            }
            
            h1 {
                font-size: 1.5rem;
            }
            
            .btn-group {
                flex-direction: column;
                gap: 10px;
            }
            
            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>
    
    <div class="cancel-container">
        <div class="cancel-icon">
            <i class="fas fa-times-circle"></i>
        </div>
        <h1>Proses Dibatalkan</h1>
        <p>Anda telah membatalkan inisialisasi sistem SosialAutoPro. Untuk menggunakan semua fitur, Anda perlu menyelesaikan proses inisialisasi terlebih dahulu.</p>
        <p>Jika ini adalah kesalahan, Anda dapat memulai kembali proses inisialisasi.</p>
        
        <div class="btn-group">
            <a href="socialautopro.html" class="btn btn-primary">
                <i class="fas fa-redo"></i> Mulai Kembali
            </a>
            <a href="https://kenthir.my.id" class="btn btn-outline">
                <i class="fas fa-home"></i> Kembali ke Beranda
            </a>
        </div>
    </div>

    <script>
        // Jika perlu menambahkan fungsionalitas JavaScript
        document.addEventListener('DOMContentLoaded', function() {
            // Bisa ditambahkan animasi atau efek tambahan
            console.log('Halaman pembatalan dimuat');
        });
    </script>
</body>
</html>
