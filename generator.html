<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kenthir AI Art Generator | Flux-Turbo by Pollinations</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Montserrat:wght@600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #7E57C2;
            --primary-dark: #5E35B1;
            --secondary: #26C6DA;
            --accent: #FFA000;
            --light: #F5F5F7;
            --dark: #263238;
            --success: #66BB6A;
            --warning: #FFA726;
            --error: #EF5350;
            --border-radius: 12px;
            --box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s ease;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--light);
            color: var(--dark);
            line-height: 1.6;
            padding: 1rem;
        }
        
        .container {
            max-width: 900px;
            margin: 1rem auto;
            padding: 1.5rem;
            background: white;
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
            width: 100%;
        }
        
        header {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        
        h1 {
            font-family: 'Montserrat', sans-serif;
            color: var(--primary-dark);
            margin-bottom: 0.5rem;
            font-size: clamp(1.8rem, 4vw, 2.2rem);
        }
        
        .subtitle {
            color: var(--primary);
            font-weight: 400;
            margin-bottom: 1rem;
            font-size: clamp(0.9rem, 2vw, 1rem);
        }
        
        .generator-form {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        
        @media (min-width: 768px) {
            .generator-form {
                grid-template-columns: 1fr 1fr;
            }
            
            .form-group.full-width {
                grid-column: span 2;
            }
        }
        
        .form-group {
            margin-bottom: 1rem;
            width: 100%;
        }
        
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--dark);
            font-size: clamp(0.9rem, 2vw, 1rem);
        }
        
        .input-icon {
            position: relative;
            width: 100%;
        }
        
        .input-icon i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary);
            font-size: clamp(0.9rem, 2vw, 1rem);
        }
        
        .input-icon input,
        .input-icon textarea,
        .input-icon select {
            padding-left: 40px !important;
            width: 100%;
            font-size: clamp(0.9rem, 2vw, 1rem);
        }
        
        textarea, select, input {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            transition: var(--transition);
            font-size: 1rem;
        }
        
        textarea:focus, select:focus, input:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(126, 87, 194, 0.2);
        }
        
        textarea {
            min-height: 120px;
            resize: vertical;
        }
        
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: clamp(0.9rem, 2vw, 1rem);
            font-weight: 500;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
        }
        
        button:hover {
            background-color: var(--primary-dark);
            transform: translateY(-2px);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .btn-generate {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            font-weight: 600;
            padding: 0.9rem 1.8rem;
            margin-top: 0.5rem;
        }
        
        .btn-generate i {
            font-size: 1.1rem;
        }
        
        .result-container {
            margin-top: 1.5rem;
            text-align: center;
        }
        
        .loading {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 8px;
            margin-bottom: 1rem;
        }
        
        .loading-spinner {
            border: 4px solid rgba(126, 87, 194, 0.2);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loading-text {
            color: var(--primary);
            font-weight: 500;
        }
        
        #imageResult {
            max-width: 100%;
            max-height: 70vh;
            border-radius: var(--border-radius);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            display: none;
            margin: 0 auto;
            border: 1px solid #eee;
            object-fit: contain;
        }
        
        .image-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            justify-content: center;
            margin-top: 1.25rem;
        }
        
        .image-actions button {
            flex: 1 1 120px;
            max-width: 200px;
        }
        
        .btn-download {
            background-color: var(--success);
        }
        
        .btn-regenerate {
            background-color: var(--secondary);
        }
        
        .btn-copy {
            background-color: var(--accent);
        }
        
        .error-message {
            color: var(--error);
            background-color: rgba(239, 83, 80, 0.1);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
            font-size: clamp(0.9rem, 2vw, 1rem);
        }
        
        .image-info {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            justify-content: center;
            margin-top: 1rem;
            font-size: clamp(0.75rem, 2vw, 0.85rem);
            color: #666;
        }
        
        .image-info span {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        
        .model-tag {
            background-color: rgba(126, 87, 194, 0.1);
            color: var(--primary);
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        
        .advanced-options {
            grid-column: span 1;
            background-color: rgba(126, 87, 194, 0.05);
            padding: 1rem;
            border-radius: 8px;
            margin-top: 0.5rem;
        }
        
        @media (min-width: 768px) {
            .advanced-options {
                grid-column: span 2;
            }
        }
        
        .advanced-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            margin-bottom: 0.5rem;
        }
        
        .advanced-content {
            display: none;
            padding-top: 0.5rem;
        }
        
        .advanced-options.active .advanced-content {
            display: block;
        }
        
        .style-presets {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 0.5rem;
            margin-top: 0.75rem;
        }
        
        @media (max-width: 480px) {
            .style-presets {
                grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            }
        }
        
        .style-preset {
            background-color: white;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            padding: 0.5rem;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            font-size: clamp(0.7rem, 2vw, 0.8rem);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .style-preset:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        
        .style-preset.active {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        footer {
            text-align: center;
            margin-top: 2rem;
            color: #666;
            font-size: clamp(0.75rem, 2vw, 0.85rem);
        }
        
        /* Improved responsive behavior */
        @media (max-width: 600px) {
            .container {
                padding: 1rem;
            }
            
            .input-icon i {
                left: 10px;
                font-size: 0.8rem;
            }
            
            .input-icon input,
            .input-icon textarea,
            .input-icon select {
                padding-left: 32px !important;
                padding: 0.6rem;
            }
            
            button {
                padding: 0.6rem 1rem;
            }
            
            .btn-generate {
                padding: 0.7rem 1.2rem;
            }
            
            .image-actions button {
                flex: 1 1 100px;
                padding: 0.6rem;
                font-size: 0.8rem;
            }
            
            .image-actions button i {
                font-size: 0.8rem;
            }
        }
        
        /* Very small devices */
        @media (max-width: 360px) {
            .style-presets {
                grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
            }
            
            .image-info span {
                flex: 1 1 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-magic"></i> Kenthir AI Pro</h1>
            <p class="subtitle">Create stunning images with Flux-Turbo technology</p>
        </header>
        
        <div class="generator-form">
            <div class="form-group full-width">
                <label for="prompt"><i class="fas fa-align-left"></i> Describe your image</label>
                <div class="input-icon">
                    <i class="fas fa-paint-brush"></i>
                    <textarea id="prompt" placeholder="Example: A majestic lion standing on a cliff at sunset, digital art, highly detailed, cinematic lighting"></textarea>
                </div>
            </div>
            
            <div class="form-group">
                <label for="model"><i class="fas fa-robot"></i> AI Model</label>
                <div class="input-icon">
                    <i class="fas fa-cog"></i>
                    <select id="model">
                        <option value="flux-turbo">Flux-Turbo (Default)</option>
                        <option disabled value="dalle">Dall-E3</option>
                        <option disabled value="midjourney">Midjourney</option>
                    </select>
                </div>
            </div>
            
            <div class="form-group">
                <label for="width"><i class="fas fa-arrows-alt-h"></i> Width</label>
                <div class="input-icon">
                    <i class="fas fa-ruler-horizontal"></i>
                    <input type="number" id="width" value="1024" min="256" max="1792">
                </div>
            </div>
            
            <div class="form-group">
                <label for="height"><i class="fas fa-arrows-alt-v"></i> Height</label>
                <div class="input-icon">
                    <i class="fas fa-ruler-vertical"></i>
                    <input type="number" id="height" value="1792" min="256" max="1792">
                </div>
            </div>
            
            <div class="advanced-options">
                <div class="advanced-toggle" onclick="toggleAdvanced()">
                    <span><i class="fas fa-sliders-h"></i> Advanced Options</span>
                    <i class="fas fa-chevron-down" id="advanced-arrow"></i>
                </div>
                <div class="advanced-content">
                    <div class="form-group">
                        <label for="seed"><i class="fas fa-fingerprint"></i> Seed (for reproducibility)</label>
                        <div class="input-icon">
                            <i class="fas fa-hashtag"></i>
                            <input type="number" id="seed" placeholder="Leave empty for random">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-palette"></i> Style Presets</label>
                        <div class="style-presets">
                            <div class="style-preset" onclick="applyStyle('Digital Art')">Digital Art</div>
                            <div class="style-preset" onclick="applyStyle('Photorealistic')">Photorealistic</div>
                            <div class="style-preset" onclick="applyStyle('Anime')">Anime</div>
                            <div class="style-preset" onclick="applyStyle('Cyberpunk')">Cyberpunk</div>
                            <div class="style-preset" onclick="applyStyle('Fantasy')">Fantasy</div>
                            <div class="style-preset" onclick="applyStyle('Watercolor')">Watercolor</div>
                            <div class="style-preset" onclick="applyStyle('Oil Painting')">Oil Painting</div>
                            <div class="style-preset" onclick="applyStyle('Pixel Art')">Pixel Art</div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="form-group full-width" style="text-align: center; margin-top: 0.5rem;">
                <button class="btn-generate" onclick="generateImage()">
                    <i class="fas fa-bolt"></i> Generate Image
                </button>
            </div>
        </div>
        
        <div class="error-message" id="errorMessage"></div>
        
        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <p class="loading-text">Generating your artwork...</p>
        </div>
        
        <div class="result-container">
            <img id="imageResult" alt="Generated image will appear here">
            
            <div class="image-actions" id="imageActions" style="display: none;">
                <button class="btn-download" onclick="downloadImage()">
                    <i class="fas fa-download"></i> Download
                </button>
                <button class="btn-regenerate" onclick="regenerateImage()">
                    <i class="fas fa-sync-alt"></i> Regenerate
                </button>
                <button class="btn-copy" onclick="copyPrompt()">
                    <i class="fas fa-copy"></i> Copy Prompt
                </button>
            </div>
            
            <div class="image-info" id="imageInfo"></div>
        </div>
        
        <footer>
            <p>Powered by Pollinations.AI Flux-Turbo model | &copy; 2025 AI Art Generator</p>
        </footer>
    </div>

  <script>
    // Global variables
    let currentImageUrl = '';
    let currentPrompt = '';
    
    // Toggle advanced options
    function toggleAdvanced() {
        const advancedOptions = document.querySelector('.advanced-options');
        const arrow = document.getElementById('advanced-arrow');
        
        advancedOptions.classList.toggle('active');
        
        if (advancedOptions.classList.contains('active')) {
            arrow.classList.remove('fa-chevron-down');
            arrow.classList.add('fa-chevron-up');
        } else {
            arrow.classList.remove('fa-chevron-up');
            arrow.classList.add('fa-chevron-down');
        }
    }
    
    // Apply style preset to prompt
    function applyStyle(style) {
        const promptTextarea = document.getElementById('prompt');
        const currentPrompt = promptTextarea.value;
        
        // Remove any existing style tags
        const cleanedPrompt = currentPrompt.replace(/,?\s*(digital art|photorealistic|anime|cyberpunk|fantasy|watercolor|oil painting|pixel art)/gi, '');
        
        // Add new style
        promptTextarea.value = `${cleanedPrompt}, ${style.toLowerCase()}`.trim();
        
        // Update active style button
        document.querySelectorAll('.style-preset').forEach(btn => {
            btn.classList.remove('active');
        });
        event.target.classList.add('active');
    }
    
    // Generate image
    async function generateImage() {
        const prompt = document.getElementById('prompt').value.trim();
        const model = document.getElementById('model').value;
        const width = document.getElementById('width').value;
        const height = document.getElementById('height').value;
        const seed = document.getElementById('seed').value;
        
        if (!prompt) {
            showError('Please enter a prompt description first!');
            return;
        }
        
        // Save current prompt
        currentPrompt = prompt;
        
        // Show loading, hide results and errors
        document.getElementById('loading').style.display = 'flex';
        document.getElementById('imageResult').style.display = 'none';
        document.getElementById('imageActions').style.display = 'none';
        document.getElementById('errorMessage').style.display = 'none';
        
        try {
            // Build URL with Flux-Turbo model
            let url = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}`;
            
            // Parameters for Flux-Turbo
            const params = new URLSearchParams();
            params.append('model', model || 'flux-turbo');
            params.append('width', width || 1024);
            params.append('height', height || 1792);
            params.append('nologo', 'true'); // This removes the Pollinations logo
            
            if (seed) {
                params.append('seed', seed);
            }
            
            // Combine parameters
            url += `?${params.toString()}`;
            
            // Add timestamp to avoid caching
            url += `&timestamp=${Date.now()}`;
            
            // Fetch image
            const response = await fetch(url);
            
            if (!response.ok) {
                throw new Error(`Server returned ${response.status}: ${response.statusText}`);
            }
            
            // Get image blob
            const blob = await response.blob();
            currentImageUrl = URL.createObjectURL(blob);
            
            // Display image
            const imageElement = document.getElementById('imageResult');
            imageElement.onload = function() {
                // Adjust display for portrait images
                if (this.naturalHeight > this.naturalWidth) {
                    this.style.maxHeight = '70vh';
                    this.style.width = 'auto';
                } else {
                    this.style.maxWidth = '100%';
                    this.style.height = 'auto';
                }
            };
            imageElement.src = currentImageUrl;
            imageElement.style.display = 'block';
            
            // Show image actions
            document.getElementById('imageActions').style.display = 'flex';
            
            // Display image info
            document.getElementById('imageInfo').innerHTML = `
                <span><i class="fas fa-robot"></i> Model: <span class="model-tag">${model}</span></span>
                <span><i class="fas fa-expand"></i> Size: ${width}×${height}px</span>
                <span><i class="fas fa-fingerprint"></i> Seed: ${seed || 'random'}</span>
            `;
            
        } catch (error) {
            console.error('Error:', error);
            showError(`Failed to generate image: ${error.message}`);
        } finally {
            // Hide loading
            document.getElementById('loading').style.display = 'none';
        }
    }
    
    // Download image
    function downloadImage() {
        if (!currentImageUrl) return;
        
        const link = document.createElement('a');
        link.href = currentImageUrl;
        link.download = `ai-art-${Date.now()}.png`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
    
    // Regenerate image
    function regenerateImage() {
        // Change seed to force new generation
        const seedInput = document.getElementById('seed');
        if (seedInput.value) {
            seedInput.value = Math.floor(Math.random() * 1000000);
        }
        generateImage();
    }
    
    // Copy prompt to clipboard
    function copyPrompt() {
        if (!currentPrompt) return;
        
        navigator.clipboard.writeText(currentPrompt)
            .then(() => {
                const btn = event.target.closest('button');
                const originalText = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
                setTimeout(() => {
                    btn.innerHTML = originalText;
                }, 2000);
            })
            .catch(err => {
                console.error('Failed to copy prompt:', err);
            });
    }
    
    // Show error message
    function showError(message) {
        const errorElement = document.getElementById('errorMessage');
        errorElement.textContent = message;
        errorElement.style.display = 'block';
    }
    
    // Initialize with some example prompts
    document.addEventListener('DOMContentLoaded', function() {
        const examples = [
            "A futuristic city floating in the clouds, neon lights, cyberpunk style, 4k detailed",
            "Portrait of a wise old wizard with a long beard, fantasy art, highly detailed",
            "A cute anime girl with pink hair in a cherry blossom garden, studio ghibli style",
            "A majestic tiger in the jungle, photorealistic, national geographic style"
        ];
        
        document.getElementById('prompt').placeholder = `Example: ${examples[Math.floor(Math.random() * examples.length)]}`;
    });
</script>
</body>
</html>
