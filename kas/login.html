<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - DANA KAS KENTHIR</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1e40af, #1d4ed8);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        
        .login-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 2.5rem;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
        }
        
        .login-title {
            text-align: center;
            margin-bottom: 2rem;
            font-size: 1.8rem;
            font-weight: 600;
        }
        
        .input-group {
            margin-bottom: 1.5rem;
        }
        
        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        
        .password-toggle {
            position: absolute;
            right: 12px;
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            transition: all 0.2s;
            background: none;
            border: none;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
        }
        
        .password-toggle:hover {
            color: white;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            font-weight: 500;
        }
        
        input {
            width: 100%;
            padding: 12px 40px 12px 15px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            box-sizing: border-box;
            height: 48px;
        }
        
        input:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }
        
        input::placeholder {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
        }
        
        button[type="submit"] {
            width: 100%;
            padding: 0.9rem;
            border-radius: 8px;
            border: none;
            background: linear-gradient(135deg, #3b82f6, #7c3aed);
            color: white;
            font-weight: 500;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
        }
        
        button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }
        
        .forgot-password {
            text-align: right;
            margin-top: -8px;
            margin-bottom: 1.2rem;
        }
        
        .forgot-password a {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.85rem;
            text-decoration: none;
            transition: color 0.2s;
        }
        
        .forgot-password a:hover {
            color: white;
            text-decoration: underline;
        }

        /* Progress Bar Styles */
        .progress-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(30, 64, 175, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 10;
        }

        .progress-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .progress-text {
            margin-bottom: 20px;
            font-size: 1.2rem;
            font-weight: 500;
        }

        .progress-bar {
            width: 80%;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #fcba03, #fcb103);
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .success-icon {
            font-size: 3rem;
            color: #4ade80;
            margin-bottom: 20px;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.3s ease 0.6s;
        }

        .progress-overlay.active .success-icon {
            opacity: 1;
            transform: scale(1);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1 class="login-title">DANA KAS KENTHIR</h1>
        
        <div class="input-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Masukkan username">
        </div>
        
        <div class="input-group">
            <label for="password">Password</label>
            <div class="password-wrapper">
                <input type="password" id="password" placeholder="Masukkan password">
                <button type="button" class="password-toggle" id="togglePassword" aria-label="Toggle password visibility">
                    <i class="fas fa-eye"></i>
                </button>
            </div>
        </div>
        
        <div class="forgot-password">
            <a href="#">Lupa password?</a>
        </div>
        
        <button type="submit" id="login-btn">Masuk</button>

        <!-- Progress Bar Overlay -->
        <div class="progress-overlay" id="progressOverlay">
            <i class="fas fa-check-circle success-icon" id="successIcon"></i>
            <div class="progress-text">Login berhasil! Mengarahkan ke halaman utama...</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>
    </div>

    <script>
        // Data login yang valid (username dan password)
        const validLogins = [
            { username: "admin", password: "admin123" },
            { username: "fufufafabendahara", password: "fufufafakenthir456" },
            { username: "anggota", password: "fufufafadana789" }
        ];

        // Toggle show/hide password
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        
        togglePassword.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            
            // Ganti icon mata
            const icon = this.querySelector('i');
            icon.classList.toggle('fa-eye');
            icon.classList.toggle('fa-eye-slash');
        });

        // Login function with progress bar
        document.getElementById('login-btn').addEventListener('click', function() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            // Cek apakah login valid
            const isValid = validLogins.some(login => 
                login.username === username && login.password === password
            );
            
            if (isValid) {
                // Tampilkan progress overlay
                const progressOverlay = document.getElementById('progressOverlay');
                const progressFill = document.getElementById('progressFill');
                progressOverlay.classList.add('active');
                
                // Animasikan progress bar
                let progress = 0;
                const interval = setInterval(() => {
                    progress += 2;
                    progressFill.style.width = `${progress}%`;
                    
                    if (progress >= 100) {
                        clearInterval(interval);
                        
                        // Simpan status login dan username
                        localStorage.setItem('isLoggedIn', 'true');
                        localStorage.setItem('username', username);
                        
                        // Redirect ke halaman sebelumnya atau beranda
                        const redirectUrl = sessionStorage.getItem('redirectUrl') || 'index.html';
                        window.location.href = redirectUrl;
                    }
                }, 30);
            } else {
                alert('Username atau password salah!');
            }
        });

        // Tambahkan event listener untuk tombol Enter
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('login-btn').click();
            }
        });
    </script>
</body>
</html>
